# Source registry skeleton for the D&D 3.5e Knowledge Chatbot.
#
# This file tracks corpus sources that are intentionally admitted into the project.
# It is a design-time registry first, and may later become an operational config.

sources:
  - source_id: phb_35
    title: Player's Handbook
    edition: 3.5e
    source_type: core_rulebook
    authority_level: official
    status: planned_later
    priority: secondary
    notes: >-
      Deliberately demoted from the earlier bootstrap-primary assumption to a later
      Phase 1 expansion. srd_35 is the current bootstrap slice because it is a
      cleaner first source for source, locator, and ingestion-contract validation.

  - source_id: dmg_35
    title: Dungeon Master's Guide
    edition: 3.5e
    source_type: core_rulebook
    authority_level: official
    status: planned_later
    priority: secondary
    notes: >-
      Planned as a later core expansion source after the bootstrap source plan and
      first ingestion slice are validated.

  - source_id: mm_35
    title: Monster Manual
    edition: 3.5e
    source_type: core_rulebook
    authority_level: official
    status: planned_later
    priority: secondary
    notes: >-
      Relevant for monster- and rules-adjacent lookups, but deferred until after the
      bootstrap slice is working.

  - source_id: srd_35
    title: System Reference Document
    edition: 3.5e
    source_type: srd
    authority_level: official_reference
    status: admitted_bootstrap
    priority: primary
    notes: >-
      Bootstrap source for Phase 1. Materialize it locally with
      `python scripts/fetch_srd_35.py` using the pinned manifest at
      `configs/bootstrap_sources/srd_35.manifest.json`, then use that admitted
      slice first for evaluation, ingestion, and citation-contract validation
      before expanding to PHB / DMG / MM.
