# Source registry skeleton for the D&D 3.5e Knowledge Chatbot.
#
# This file tracks corpus sources that are intentionally admitted into the project.
# It is a design-time registry first, and may later become an operational config.

sources:
  - source_id: phb_35
    title: Player's Handbook
    edition: 3.5e
    source_type: core_rulebook
    authority: official
    status: planned
    priority: primary
    notes: >-
      Core rules source candidate for Phase 1.

  - source_id: dmg_35
    title: Dungeon Master's Guide
    edition: 3.5e
    source_type: core_rulebook
    authority: official
    status: planned
    priority: secondary
    notes: >-
      Planned as a later core expansion source after initial Phase 1 corpus definition.

  - source_id: mm_35
    title: Monster Manual
    edition: 3.5e
    source_type: core_rulebook
    authority: official
    status: planned
    priority: secondary
    notes: >-
      Relevant for monster- and rules-adjacent lookups, but not required to define the initial ingestion model.

  - source_id: srd_35
    title: System Reference Document
    edition: 3.5e
    source_type: srd_reference
    authority: official_reference
    status: optional
    priority: secondary
    notes: >-
      Optional structured reference source if explicitly added to the Phase 1 corpus.
