# Retrieval hard filters — applied before candidate scoring.
#
# These constraints lock retrieval to admitted boundaries.
# Phase 1 supports D&D 3.5e only, so the defaults below are
# essentially placeholders that codify the current single-edition scope.

# Edition allowlist — only chunks from these editions are candidates.
editions:
  - "3.5e"

# Source-type allowlist — only these source types are candidates.
# Values must match source_type in source_registry.yaml.
source_types:
  - core_rulebook
  - supplement_rulebook
  - errata_document
  - faq_document
  - srd

# Authority-level allowlist — minimum trust tier for candidate chunks.
# Values must match authority_level in source_registry.yaml.
authority_levels:
  - official
  - official_reference

# Source exclusions — specific source_ids to exclude even if they
# otherwise pass the filters above.  Empty for now.
excluded_source_ids: []
